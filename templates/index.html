<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOGY AI | مملكة الإمبراطور</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0f172a; color: white; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; }
        .chat-container { width: 90%; max-width: 500px; background: #1e293b; padding: 25px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); position: relative; border: 1px solid #334155; }
        .profile-icon { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #fbbf24; margin: -75px auto 20px; background: #0f172a; display: flex; align-items: center; justify-content: center; color: #fbbf24; font-size: 55px; font-weight: bold; box-shadow: 0 0 20px rgba(251, 191, 36, 0.4); }
        #response { background: #334155; padding: 20px; border-radius: 20px; min-height: 150px; margin-bottom: 20px; line-height: 1.7; font-size: 17px; border-right: 6px solid #fbbf24; }
        .input-area { display: flex; gap: 10px; background: #0f172a; padding: 10px; border-radius: 15px; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; padding: 10px; font-size: 16px; }
        .send-btn { background: #fbbf24; color: #0f172a; border: none; padding: 10px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .footer { margin-top: 20px; font-size: 12px; color: #64748b; text-align: center; }
        .footer b { color: #fbbf24; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="profile-icon">B</div>
        <h2 style="text-align: center; color: #fbbf24; margin-top: 0;">BOGY AI</h2>
        <div id="response">أهلاً بك يا إمبراطور حسن.. أنا مساعدك الذكي، اطلب ما تشاء!</div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="اكتب سؤالك هنا...">
            <button class="send-btn" onclick="askAI()">إرسال</button>
        </div>

        <div class="footer">
            تم التطوير بواسطة الإمبراطور <b>BOGY</b> © 2026
        </div>
    </div>

    <script>
        async function askAI() {
            const input = document.getElementById('userInput');
            const resBox = document.getElementById('response');
            if (!input.value) return;

            resBox.innerText = "جاري التفكير... ⏳";

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: input.value })
                });
                const data = await response.json();
                // تعديل بسيط لقراءة رد Gemini الصحيح
                if (data.candidates) {
                    resBox.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    resBox.innerText = "وصل الرد بنجاح! جرب سؤالاً آخر.";
                }
            } catch (e) {
                resBox.innerText = "السيرفر شغال بس فيه ضغط، جرب تاني يا بوجي!";
            }
            input.value = '';
        }
    </script>
</body>
</html>
